# 여섯소리 웹 - 자체 서버 배포용
# 사용: `cp .env.example .env` 로 값 채운 뒤 `docker compose up -d --build`
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sixsound}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sixsound}
      POSTGRES_DB: ${POSTGRES_DB:-sixsound}
    networks:
      # 고유 별칭. be_default에도 'db' 서비스(SyncLog)가 있어 이름 충돌을 피한다.
      default:
        aliases:
          - sixsound-db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sixsound}"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sixsound}:${POSTGRES_PASSWORD:-sixsound}@sixsound-db:5432/${POSTGRES_DB:-sixsound}?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@sixsound.kr}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme1234}
      ADMIN_NAME: ${ADMIN_NAME:-운영진}
      # CLOVA OCR (영수증 자동 인식). 비우면 자동 인식만 비활성화된다.
      CLOVA_OCR_INVOKE_URL: ${CLOVA_OCR_INVOKE_URL:-}
      CLOVA_OCR_SECRET: ${CLOVA_OCR_SECRET:-}
    ports:
      # 디버그용으로 호스트 로컬에만 노출(외부 노출은 Caddy가 담당). 3000은 다른 앱이 점유.
      - "127.0.0.1:${APP_PORT:-3100}:3000"
    networks:
      # 자체 네트워크(db 접근) + Caddy가 붙어 있는 be_default(리버스 프록시)
      default: {}
      proxy:
        aliases:
          - sixsound-app
    volumes:
      # 업로드 이미지 영속화
      - uploads:/app/public/uploads
      # 영수증(비공개). public/ 밖이라 정적 서빙되지 않고 인증 라우트로만 읽힌다.
      - receipts:/app/private-uploads

networks:
  # be(SyncLog) compose가 만든 네트워크. Caddy(be-caddy-1)가 여기 붙어 있다.
  proxy:
    external: true
    name: be_default

volumes:
  db_data:
  uploads:
  receipts:
